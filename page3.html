<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Base Encoder/Decoder</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        textarea { width: 100%; height: 100px; margin: 10px 0; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; resize: vertical; }
        select, button { padding: 10px; margin-top: 10px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; }
        button { background-color: #007bff; color: white; border: none; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .output-label { font-weight: bold; margin-top: 20px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>Base Encoder & Decoder</h2>
    
    <label for="inputText">Input Text:</label>
    <textarea id="inputText" placeholder="Enter text here..."></textarea>

    <div class="controls">
        <select id="mode">
            <option value="encode">Encode</option>
            <option value="decode">Decode</option>
        </select>

        <select id="base">
            <option value="64">Base 64</option>
            <option value="32">Base 32</option>
            <option value="16">Base 16 (Hex)</option>
        </select>

        <button onclick="process()">Convert</button>
    </div>

    <label class="output-label">Result:</label>
    <textarea id="outputText" readonly></textarea>
</div>

<script>
    // --- Logic Helpers ---
    const BASE32_ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";

    const base32Encode = (str) => {
        let binary = "";
        for (let i = 0; i < str.length; i++) {
            binary += str.charCodeAt(i).toString(2).padStart(8, '0');
        }
        let encoded = "";
        for (let i = 0; i < binary.length; i += 5) {
            let chunk = binary.substr(i, 5).padEnd(5, '0');
            encoded += BASE32_ALPHABET[parseInt(chunk, 2)];
        }
        return encoded;
    };

    const base32Decode = (str) => {
        let binary = "";
        for (let char of str.toUpperCase().replace(/=+$/, '')) {
            let val = BASE32_ALPHABET.indexOf(char);
            if (val === -1) continue;
            binary += val.toString(2).padStart(5, '0');
        }
        let decoded = "";
        for (let i = 0; i + 8 <= binary.length; i += 8) {
            decoded += String.fromCharCode(parseInt(binary.substr(i, 8), 2));
        }
        return decoded;
    };

    const hexEncode = (str) => 
        Array.from(str).map(c => c.charCodeAt(0).toString(16).padStart(2, '0')).join('');

    const hexDecode = (hex) => 
        hex.match(/.{1,2}/g).map(byte => String.fromCharCode(parseInt(byte, 16))).join('');

    // --- Main Function ---
    function process() {
        const input = document.getElementById('inputText').value;
        const mode = document.getElementById('mode').value;
        const base = document.getElementById('base').value;
        const outputField = document.getElementById('outputText');
        
        try {
            let result = "";
            if (mode === "encode") {
                if (base === "64") result = btoa(input);
                else if (base === "32") result = base32Encode(input);
                else if (base === "16") result = hexEncode(input);
            } else {
                if (base === "64") result = atob(input);
                else if (base === "32") result = base32Decode(input);
                else if (base === "16") result = hexDecode(input);
            }
            outputField.value = result;
        } catch (e) {
            outputField.value = "Error: Invalid input for selected decoding method.";
        }
    }
</script>

</body>
</html>
